services:
  postgres:
    image: postgres:16-alpine
    container_name: tracker_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_dev_password
    volumes:
      - tracker_pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tracker_pg_data:
